name: Actualizar pronósticos

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: climate-forecasts
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Consultar las 475 referencias
        run: |
          python scripts/actualizar_pronosticos.py \
            --sleep-seconds 2.0 \
            --http-attempts 4 \
            --retry-base-seconds 2.0

      - name: Ejecutar pruebas
        run: python -m unittest discover -s tests -v

      - name: Publicar actualización
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache/pronosticos.json data/fuentes/pronosticos_historicos_antartida.json docs

          if git diff --cached --quiet; then
            echo "No hay cambios para guardar."
            exit 0
          fi

          git commit -m "Actualizar pronósticos meteorológicos"

          for intento in 1 2 3; do
            echo "Intento de publicación ${intento}/3"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Conflicto con un cambio manual en archivos generados."
              exit 1
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 5
          done
          exit 1
