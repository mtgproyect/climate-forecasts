name: Upload forecasts to Cloudflare R2

on:
  workflow_dispatch:

jobs:
  upload-r2:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: true
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          python -m pip install --upgrade pip
          pip install awscli

      - name: Upload forecast manifest
        run: |
          aws s3 cp docs/manifiesto.json s3://weathervar-data/forecasts/manifiesto.json \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "public, max-age=300"

      - name: Upload forecast files
        run: |
          aws s3 sync docs/pronosticos/ s3://weathervar-data/forecasts/pronosticos/ \
            --endpoint-url "$R2_ENDPOINT" \
            --delete \
            --content-type "application/json" \
            --cache-control "public, max-age=300"
